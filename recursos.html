<!DOCTYPE html>
<html class="light" lang="es">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Recursos Educativos - CV Felipe Cuevas</title>
  <link rel="icon" type="image/svg+xml" href="static/img/favicon.svg">

  <meta name="description" content="Bóveda de Recursos Educativos de Felipe Cuevas. Descarga manuales, ejercicios y clases sobre Java, Python, Ingeniería de Datos y Empleabilidad IT.">
  <meta name="author" content="Felipe Cuevas">

  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="static/css/tailwind.css" />
  <link rel="stylesheet" href="static/css/index.css"/>
  <link rel="stylesheet" href="static/css/aos.css" />

  <script>
    if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
    } else {
      document.documentElement.classList.remove('dark');
    }
  </script>
</head>
<body class="bg-background-light dark:bg-background-dark text-orient-950 dark:text-orient-50 transition-colors duration-300">
<div class="relative flex min-h-screen flex-col overflow-x-hidden">

  <header id="app-header" class="sticky top-0 z-50 w-full border-b border-orient-200 dark:border-orient-800 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md">
  </header>

  <main class="flex-1 w-full max-w-[1200px] mx-auto px-6 md:px-10 py-12">

    <div class="flex flex-col gap-3 mb-10 border-b border-orient-200 dark:border-orient-800 pb-8">
      <h1 data-aos="fade-down" class="text-orient-950 dark:text-orient-50 text-4xl md:text-5xl font-black leading-tight tracking-tight">
        Bóveda de <span class="text-primary">Recursos</span>
      </h1>
      <p data-aos="fade-up" data-aos-delay="100" class="text-orient-600 dark:text-orient-300 text-lg font-normal leading-normal max-w-2xl">
        Accede a mi biblioteca personal de material pedagógico. Manuales, repositorios y clases magistrales diseñadas para potenciar tus habilidades tecnológicas.
      </p>
    </div>

    <section class="relative">
      <div class="absolute top-10 left-10 w-72 h-72 bg-primary/20 rounded-full blur-[100px] -z-10 pointer-events-none"></div>
      <div class="absolute bottom-10 right-10 w-72 h-72 bg-orient-300/20 rounded-full blur-[100px] -z-10 pointer-events-none"></div>

      <div data-aos="zoom-in" data-aos-delay="200" class="relative z-10 bg-white/40 dark:bg-orient-900/40 backdrop-blur-xl border border-white/60 dark:border-orient-700/50 rounded-[2rem] shadow-2xl p-6 md:p-10">

        <div class="flex flex-col lg:flex-row justify-between items-center gap-6 mb-10 bg-white/60 dark:bg-orient-950/50 backdrop-blur-md p-4 rounded-2xl border border-white/50 dark:border-orient-800/50">

          <div class="relative w-full lg:w-1/3">
            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-orient-400">search</span>
            <input type="text" id="search-recursos" placeholder="Buscar por tecnología o título..."
                   class="w-full bg-white/80 dark:bg-orient-900/80 border border-orient-200 dark:border-orient-700 rounded-xl h-12 pl-12 pr-4 text-sm focus:ring-2 focus:ring-primary focus:border-primary transition-all text-orient-950 dark:text-orient-50 placeholder:text-orient-400">
          </div>

          <div id="filtros-container" class="flex flex-wrap items-center justify-center gap-2 w-full lg:w-auto">
            <button data-filter="Todos" class="filtro-btn px-4 py-2 bg-primary text-white text-xs font-bold uppercase tracking-wider rounded-lg shadow-md transition-transform hover:-translate-y-0.5">Todos</button>
            <button data-filter="Java" class="filtro-btn px-4 py-2 bg-white/50 dark:bg-orient-800/50 hover:bg-white dark:hover:bg-orient-800 text-orient-700 dark:text-orient-200 text-xs font-bold uppercase tracking-wider rounded-lg border border-orient-200 dark:border-orient-700 transition-all hover:-translate-y-0.5">Java</button>
            <button data-filter="Python" class="filtro-btn px-4 py-2 bg-white/50 dark:bg-orient-800/50 hover:bg-white dark:hover:bg-orient-800 text-orient-700 dark:text-orient-200 text-xs font-bold uppercase tracking-wider rounded-lg border border-orient-200 dark:border-orient-700 transition-all hover:-translate-y-0.5">Python</button>
            <button data-filter="Ingenieria Datos" class="filtro-btn px-4 py-2 bg-white/50 dark:bg-orient-800/50 hover:bg-white dark:hover:bg-orient-800 text-orient-700 dark:text-orient-200 text-xs font-bold uppercase tracking-wider rounded-lg border border-orient-200 dark:border-orient-700 transition-all hover:-translate-y-0.5">Ingeniería Datos</button>
            <button data-filter="Empleabilidad" class="filtro-btn px-4 py-2 bg-white/50 dark:bg-orient-800/50 hover:bg-white dark:hover:bg-orient-800 text-orient-700 dark:text-orient-200 text-xs font-bold uppercase tracking-wider rounded-lg border border-orient-200 dark:border-orient-700 transition-all hover:-translate-y-0.5">Empleabilidad</button>
          </div>
        </div>

        <div id="recursos-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        </div>
      </div>
    </section>

  </main>

  <footer id="app-footer" class="mt-auto w-full border-t border-orient-200 dark:border-orient-800 py-10">
  </footer>
</div>
<script src="static/js/recursos.js"></script>
<script src="static/js/index.js"></script>
<script src="static/js/aos.js"></script>
</body>
</html>
